<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Utilizo Font Awesome para los iconos-->
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="/practica9Interface/style/style.css"
    />
    <title>Agenda</title>
  </head>
  <body>
    <div class="container">
      <h1>Agenda personal</h1>
      <p class="subtitle">Guarda y consulta tus eventos pendientes</p>
      <div class="cajas">
        <div class="addevent">
          <h1>Añadir evento</h1>
          <label>Título del evento</label>
          <input
            type="text"
            class="title"
            placeholder="Ej: Concierto de Rosalía"
          />
          <label>Fecha del evento</label>
          <input type="datetime-local" class="date" />
          <label>Duracion del evento (en minutos)</label>
          <input type="number" class="duration" placeholder="60" />

          <button class="btn add">+ Añadir evento</button>
        </div>
        <div class="events">
          <h1>Buscar evento</h1>
          <div class="conjunto">
            <div class="botones">
              <button class="btn hoy">Hoy</button>
              <button class="btn buscarFecha">Buscar por fecha</button>
            </div>
            <div class="seleccionarFecha">
              <label>Fecha del evento</label>
              <div class="datebutton">
                <input type="date" class="fechaseleccionarFecha" />
                <button class="btn buscar">Buscar</button>
              </div>
            </div>
          </div>

          <div id="listaeventos">
            <ul id="lista"></ul>
            <p id="vacio">No se ha encontrado ningún evento</p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="js/app.js"></script>
    <!-- type = module para poder importar las clases proximamente -->
  </body>
</html>
